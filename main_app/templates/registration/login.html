{% extends 'base.html' %}
{% block title %}Log In — Fitness Genius{% endblock %}
{% block content %}
<div class="form-card">
  <div class="form-title">
    <h1>Welcome back</h1>
    <p class="subtle">Log in to pick up your training.</p>
  </div>
  <div class="panel">
    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      {{ form.as_p }}
      <input type="hidden" name="next" value="{{ next }}">
      <input type="submit" class="btn btn-solid" value="Log in">
    </form>
  </div>
  <p class="form-foot">New here? <a href="{% url 'signup' %}">Create an account</a></p>
</div>
{% endblock %}
